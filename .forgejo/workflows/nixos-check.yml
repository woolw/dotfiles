name: Nix Configuration Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  check-nixos:
    runs-on: docker
    container:
      image: nixos/nix:latest
    steps:
      - name: Bootstrap Node.js
        run: nix-env -iA nixpkgs.nodejs

      - uses: actions/checkout@v4

      - name: Configure Nix
        run: |
          echo "experimental-features = nix-command flakes" >> /etc/nix/nix.conf
          echo "accept-flake-config = true" >> /etc/nix/nix.conf

      - name: Build NixOS configuration
        run: nix build .#nixosConfigurations.nixos.config.system.build.toplevel --dry-run

      - name: Check flake formatting
        run: nix run nixpkgs#nixfmt-tree -- --fail-on-change .
        continue-on-error: true

  lint:
    runs-on: docker
    container:
      image: nixos/nix:latest
    steps:
      - name: Bootstrap Node.js
        run: nix-env -iA nixpkgs.nodejs

      - uses: actions/checkout@v4

      - name: Configure Nix
        run: echo "experimental-features = nix-command flakes" >> /etc/nix/nix.conf

      - name: statix
        run: nix run nixpkgs#statix -- check .
        continue-on-error: true

      - name: deadnix
        run: nix run nixpkgs#deadnix -- --fail .
        continue-on-error: true
