# Video
vo=gpu-next
gpu-api=vulkan

# HDR passthrough — let the display handle HDR metadata instead of tone-mapping
target-colorspace-hint=yes

# Cache — 3x defaults (450MiB forward, 150MiB back, 30s read-ahead)
cache=yes
demuxer-max-bytes=471859200
demuxer-max-back-bytes=157286400
demuxer-readahead-secs=30
